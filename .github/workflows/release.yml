name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"          # e.g. v1.0.0
            CARGO_VERSION="${VERSION#v}"              # strip leading v
            CHANNEL="stable"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            VERSION="nightly-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
            CARGO_VERSION="0.0.0-nightly.$(date -u +%Y%m%d)"
            CHANNEL="nightly"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "cargo_version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (tags + labels)
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=nightly,enable=${{ github.ref_type != 'tag' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_CARGO_VERSION=${{ steps.meta.outputs.cargo_version }}
            BUILD_CHANNEL=${{ steps.meta.outputs.channel }}
            BUILD_COMMIT=${{ steps.meta.outputs.sha_short }}
            GITHUB_REPOSITORY=${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Stable release ──
      - name: Create GitHub Release
        if: steps.meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

      # ── Nightly pre-release (updated on every master push) ──
      - name: Delete old nightly release
        if: steps.meta.outputs.is_release == 'false'
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        if: steps.meta.outputs.is_release == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: 'Nightly (${{ steps.meta.outputs.version }})'
          body: |
            Automated nightly build from `master` branch.
            - Commit: ${{ github.sha }}
            - Image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly`
          draft: false
          prerelease: true
