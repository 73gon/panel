services:
  openpanel:
    build: .
    container_name: openpanel
    restart: unless-stopped
    ports:
      - '6515:6515'
    volumes:
      # Persistent data (database + update trigger)
      - openpanel-data:/data
      # Mount your book/manga libraries
      - /mnt/books/manga:/libraries/manga:ro
    environment:
      - OPENPANEL_PORT=6515
      - OPENPANEL_DATA_DIR=/data
      - DATABASE_URL=sqlite:///data/openpanel.db?mode=rwc
      - OPENPANEL_LOG_LEVEL=info
      - OPENPANEL_LIBRARY_ROOTS=/libraries

volumes:
  openpanel-data:
